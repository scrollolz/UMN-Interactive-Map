<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>UMN-TC Interactive Map</title>
   <!--<link rel="stylesheet" href="style.css">-->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
   <!-- Font Awesome -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <link rel="stylesheet" href="../css/style.css">
   <link rel="stylesheet" href="../css/toggle.css">
   <link rel="stylesheet" href="../css/search.css">
   <link rel="stylesheet" href="../css/dropdown.css">
   <style>#map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; }</style>
</head>
<body>

   <!-- jQuery CDN - Must load before other scripts -->
   <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

   <!-- Menu Button -->
   <div class="menu-btn">
       <i class="fas fa-bars"></i>
   </div>
  
   <!-- Sidebar -->
   <div class="side-bar">
       <header>  
           <div class="title">
                <div class="close-btn">
                    <i class="fas fa-angle-left"></i>
                </div>
                <img src="../img/goldy.png" alt="">
                <h1 style ="text-align: center; color: #D4AF37">UMN Interactive Map</h1>
           </div>
       </header>
      
       <!-- Location Categories Panel -->
       <div class="location-panel">

            <div class="topnav">
                <div class="dropdown">
                    <button class="dropbtn" id="campusDropdown" style="color:white">
                        East Bank <i class="fas fa-angle-down" style="color:#D4AF37"></i>
                    </button>
                    <div class="dropdown-content">
                        <a href="#" data-campus="East Bank">East Bank</a>
                        <a href="#" data-campus="West Bank">West Bank</a>
                        <a href="#" data-campus="St. Paul">St. Paul</a>
                    </div>
                </div>
                <input type="text" placeholder="Search markers..." id="searchInput">
            </div>

            <div class="search-mode">

                 <span style="padding-left: 20px; color:#510000; font-weight: bold;">
                     Search by...
                </span>

                <label class="radio-option">
                    <input type="radio" name="searchMode" value="mark" checked>
                    <span style="color: #510000">Building</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="searchMode" value="category">
                    <span style="color: #510000">Category</span>
                </label>
            </div>

            <div id="searchNoResults" class="search-no-results" style="display: none;">
                No results
            </div>

            

            <button id="add-btn" class="toggle-btn add-btn">
                <i class="fas fa-plus" style="color:#D4AF37"></i> Add Location
            </button>

            <div style=" color:#510000; font-style: italic;">
                Know a location but don't see it on the map? Click the button above to add it!
            </div>

            <h3 style = "text-align: left; color: #510000; margin-top: 20px; font-weight:bold"> Location Categories</h3>

           <div class="toggle-buttons">
               <button class="toggle-btn" data-category="coffee">
                   <i class="fas fa-coffee"></i>
                   Coffee Shops
               </button>
               <button class="toggle-btn" data-category="study">
                   <i class="fas fa-book"></i>
                   Study Spaces
               </button>
               <button class="toggle-btn" data-category="vending">
                   <i class="fas fa-shopping-cart"></i>
                   Vending Machines
               </button>
               <button class="toggle-btn" data-category="microwaves">
                   <i class="fas fa-utensils"></i>
                   Microwaves
               </button>
               <button class="toggle-btn" data-category="bike">
                    <i class="fas fa-bicycle"></i>
                    Bike Parking
               </button>
               <button class="toggle-btn" data-category="parkinggarages">
                    <i class="fas fa-car"></i>
                    Parking Garages
               </button>
               <button class="toggle-btn" data-category="busstops">
                    <i class="fas fa-bus"></i>
                    Gopher Bus Stops
               </button> 
               <button class="toggle-btn" data-category="metrotransit">
                    <i class="fa-solid fa-train"></i>
                    Metro Transit
               </button>
               <button class="toggle-btn" data-category="printing">
                    <i class="fa-solid fa-print"></i>
                    Printing
               </button>
               <button class="toggle-btn" data-category="cseprinting">
                    <i class="fa-solid fa-print"></i>
                    CSE Printing
               </button>  
               <button class="toggle-btn" data-category="bathrooms">
                    <i class="fas fa-toilet-paper"></i>
                    Gender-Neutral Bathrooms
               </button>
               
           </div>
       </div>
   </div>

   <div id="add-form" class="add-form hidden">
    <div class="add-form-box">
        <h3 style="color:#510000;">Add New Location</h3>

        <label>Category:</label>
        <select id="form-category">
            <option value="coffee">Coffee</option>
            <option value="study">Study</option>
            <option value="microwaves">Microwaves</option>
            <option value="vending">Vending</option>
            <option value="bike">Bike Parking</option>
            <option value="bathrooms">Bathrooms</option>
            <option value="busstops">Bus Stops</option>
            <option value="parkinggarages">Parking Garages</option>
            <option value="metrotransit">Metro Transit</option>
            <option value="printing">Printing</option>
            <option value="cseprinting">CSE Printing</option>
        </select>

        <label id="label-hall">Building (Hall):</label>
        <input type="text" id="form-hall" placeholder="e.g. Keller Hall">

        <label id="label-floor">Floor:</label>
        <input type="text" id="form-floor" placeholder="e.g. 3">

        <label id="label-note">Note:</label>
        <input type="text" id="form-note" placeholder="e.g. Near elevators">

        <div class="form-buttons">
            <button id="save-location" class="toggle-btn">Save</button>
            <button id="cancel-location" class="toggle-btn">Cancel</button>
        </div>
    </div>
</div>
    <div id="submission-message" style="display:none; padding:10px; margin:10px; background:#e6ffe6; border:1px solid #66bb66; color:#225522; border-radius:4px;">
    Thank you! Your location has been submitted for approval and will appear on the map once it’s approved.
    </div>
    <div id="map"></div>
    <div id="sidebar"></div>

   <script src="../waypoints/coffee.js"></script>
   <script src="../waypoints/vending.js"></script>
   <script src="../waypoints/study.js"></script>
   <script src="../waypoints/microwaves1.js"></script>
   <script src="../waypoints/bike.js"></script>
   <script src="../waypoints/bathrooms.js"></script>
   <script src="../waypoints/parkinggarages.js"></script>
   <script src="../waypoints/busstops.js"></script>
   <script src="../waypoints/metrotransit.js"></script>
   <script src="../waypoints/cseprinting.js"></script>

   <script src="../js/sidebar.js"></script>
   <script src="../js/index.js"></script>
   <script src="../js/sidebar.js"></script>
</body>
</html>
